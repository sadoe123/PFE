server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header Access-Control-Allow-Origin  * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    if ($request_method = OPTIONS) { return 204; }

    location /api/favorites {
    proxy_pass         http://onepilot_api:8000/api/favorites;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 100M;
}
location /api/share {
    proxy_pass         http://onepilot_api:8000/api/share;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 100M;
}

    # Proxy universel /api/* → retire le préfixe /api et envoie à l'API
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://onepilot_api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
        proxy_cache        off;
        client_max_body_size 500M;
    }

    location /sources {
        proxy_pass         http://onepilot_api:8000/sources;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }
    location /relations {
        proxy_pass         http://onepilot_api:8000/relations;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location /conversations {
        proxy_pass         http://onepilot_api:8000/conversations;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }
    location /chat {
        proxy_pass         http://onepilot_api:8000/chat;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
        proxy_cache        off;
        client_max_body_size 100M;
    }
    location /dashboard {
        proxy_pass         http://onepilot_api:8000/dashboard;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }
    location /favorites {
        proxy_pass         http://onepilot_api:8000/favorites;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }
    location /notifications {
        proxy_pass         http://onepilot_api:8000/notifications;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering    off;
        proxy_cache        off;
    }
    location /feedback {
        proxy_pass         http://onepilot_api:8000/feedback;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location /nlu {
        proxy_pass         http://onepilot_api:8000/nlu;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location /voice {
        proxy_pass         http://onepilot_api:8000/voice;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location /upload {
        proxy_pass         http://onepilot_api:8000/upload;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location /uploads {
        proxy_pass         http://onepilot_api:8000/uploads;
        proxy_set_header   Host $host;
    }
    location /health {
        proxy_pass         http://onepilot_api:8000/health;
        proxy_set_header   Host $host;
    }
    location /connector-types {
        proxy_pass         http://onepilot_api:8000/connector-types;
        proxy_set_header   Host $host;
    }
    location /docs {
        proxy_pass         http://onepilot_api:8000/docs;
        proxy_set_header   Host $host;
    }
    location /openapi.json {
        proxy_pass         http://onepilot_api:8000/openapi.json;
        proxy_set_header   Host $host;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
